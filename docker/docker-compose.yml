services:

  # =========================================================
  # POSTGRES
  # =========================================================
  postgres:
    image: postgres:15

    #container_name: postgres_dw

    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Metadata DB do Airflow
      POSTGRES_DB: ${AIRFLOW_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

      # Scripts SQL executados automaticamente
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - airflow_network


  # =========================================================
  # AIRFLOW INIT
  # =========================================================
  airflow-init:

    build: .

    #container_name: airflow_init

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth

      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}"

    command: >
      bash -c "
        airflow db migrate &&

        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@email.com || true &&

        airflow connections add postgres_dw \
          --conn-type postgres \
          --conn-host postgres \
          --conn-schema sales_dw \
          --conn-login ${POSTGRES_USER} \
          --conn-password ${POSTGRES_PASSWORD} \
          --conn-port 5432 || true
      "

    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - ../logs:/opt/airflow/logs
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests
      - ./dbt_project/dbt_logs:/tmp/dbt_logs

    networks:
      - airflow_network


  # =========================================================
  # AIRFLOW WEBSERVER
  # =========================================================
  airflow-webserver:

    build: .

    #container_name: airflow_webserver

    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    env_file:
      - .env

    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth

      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}"

    command: webserver

    ports:
      - "8080:8080"

    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - ../logs:/opt/airflow/logs
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests
      - ./dbt_project/dbt_logs:/tmp/dbt_logs

    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

    networks:
      - airflow_network


  # =========================================================
  # AIRFLOW SCHEDULER
  # =========================================================
  airflow-scheduler:

    build: .

    #container_name: airflow_scheduler

    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    env_file:
      - .env

    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}"

    command: scheduler

    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - ../logs:/opt/airflow/logs
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests
      - ./dbt_project/dbt_logs:/tmp/dbt_logs

    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$HOSTNAME"]
      interval: 10s
      timeout: 10s
      retries: 5

    networks:
      - airflow_network


  # =========================================================
  # AIRFLOW TRIGGERER
  # =========================================================
  airflow-triggerer:

    build: .

    #container_name: airflow_triggerer

    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    env_file:
      - .env

    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}"

    command: triggerer

    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - ../logs:/opt/airflow/logs
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests
      - ./dbt_project/dbt_logs:/tmp/dbt_logs

    networks:
      - airflow_network


  # =========================================================
  # PGADMIN
  # =========================================================
  pgadmin:

    image: dpage/pgadmin4

    #container_name: pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - airflow_network


# =========================================================
# NETWORK
# =========================================================
networks:
  airflow_network:


# =========================================================
# VOLUMES
# =========================================================
volumes:
  postgres_data:
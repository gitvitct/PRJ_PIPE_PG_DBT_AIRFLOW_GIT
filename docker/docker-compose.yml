services:

  # =========================================================
  # POSTGRES
  # =========================================================
  postgres:
    image: postgres:15
    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${AIRFLOW_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - airflow_network

  # =========================================================
  # AIRFLOW INIT
  # =========================================================
  airflow-init:
    build: .
    user: "0:0"

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}

    command: >
      bash -c "
      mkdir -p /opt/airflow/logs/dag_processor_manager &&
      mkdir -p /opt/airflow/logs/scheduler &&
      mkdir -p /opt/airflow/data/deadletter &&

      chown -R 50000:0 /opt/airflow/logs &&
      chown -R 50000:0 /opt/airflow/data &&

      chmod -R 775 /opt/airflow/logs &&
      chmod -R 775 /opt/airflow/data &&

      airflow db migrate &&

      airflow users create
        --username airflow
        --password airflow
        --firstname Airflow
        --lastname Admin
        --role Admin
        --email admin@email.com || true
      "

    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - airflow_logs:/opt/airflow/logs
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests

    networks:
      - airflow_network

  # =========================================================
  # WEBSERVER
  # =========================================================
  airflow-webserver:
    build: .
    user: "50000:0"
    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    env_file:
      - .env

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}

    command: webserver

    ports:
      - "8080:8080"

    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - airflow_logs:/opt/airflow/logs
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests

    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

    networks:
      - airflow_network

  # =========================================================
  # SCHEDULER
  # =========================================================
  airflow-scheduler:
    build: .
    user: "50000:0"
    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    env_file:
      - .env

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}

    command: scheduler

    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - airflow_logs:/opt/airflow/logs
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests

    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$HOSTNAME"]
      interval: 10s
      timeout: 10s
      retries: 5

    networks:
      - airflow_network

  # =========================================================
  # TRIGGERER
  # =========================================================
  airflow-triggerer:
    build: .
    user: "50000:0"
    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    env_file:
      - .env

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}

    command: triggerer

    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
      - airflow_logs:/opt/airflow/logs
      - ../scripts:/opt/airflow/scripts
      - ../tests:/opt/airflow/tests

    networks:
      - airflow_network

  # =========================================================
  # PGADMIN
  # =========================================================
  pgadmin:
    image: dpage/pgadmin4
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - airflow_network

# =========================================================
# NETWORKS
# =========================================================
networks:
  airflow_network:

# =========================================================
# VOLUMES
# =========================================================
volumes:
  postgres_data:
  airflow_logs:
  airflow_data: